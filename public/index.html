<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>やわらか会話チャット</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="demo-page">
    <header class="top-bar">
      <div class="title-area">
        <h1>やわちゃっと</h1>
      </div>

      <p class="concept">
        強い言葉をそのまま届けず、相手にはやさしい言葉として表示する会話サポートチャット
      </p>

      <button id="resetButton" class="reset-button" type="button">
        会話をリセット
      </button>
    </header>

    <section class="demo-grid">
      <!-- Aさん側 -->
      <section class="chat-panel customer-panel">
        <div class="panel-header">
          <div>
            <p class="role-chip customer">Aさん側</p>
            <h2>Aさん ちゃっと</h2>
          </div>
          <p class="panel-note">
            Bさんの強い言葉は、やさしい言葉に変換されて届きます。
          </p>
        </div>

        <div id="customerMessages" class="message-list"></div>

        <form id="customerForm" class="composer">
          <textarea
            id="customerInput"
            placeholder="Aさんのメッセージを入力"
            required
          ></textarea>

          <button id="customerSendButton" class="send-button customer-send" type="submit">
            Aさんとして送信
          </button>
        </form>
      </section>

      <!-- Bさん側 -->
      <section class="chat-panel agent-panel">
        <div class="panel-header">
          <div>
            <p class="role-chip agent">Bさん側</p>
            <h2>Bさん ちゃっと</h2>
          </div>
          <p class="panel-note">
            Aさんの強い言葉は、やさしい言葉に変換されて届きます。
          </p>
        </div>

        <div id="agentMessages" class="message-list"></div>

        <form id="agentForm" class="composer">
          <textarea
            id="agentInput"
            placeholder="Bさんのメッセージを入力"
            required
          ></textarea>

          <button id="agentSendButton" class="send-button agent-send" type="submit">
            Bさんとして送信
          </button>
        </form>
      </section>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
