<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>やわらかCSチャット</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="demo-page">
    <header class="top-bar">
      <div class="title-area">
        <p class="eyebrow">Hackathon Demo</p>
        <h1>やわらかCSチャット</h1>
      </div>

      <p class="concept">
        強い言葉をそのまま届けず、相手にはやさしい言葉として表示するカスタマーサポートチャット
      </p>

      <button id="resetButton" class="reset-button" type="button">
        会話をリセット
      </button>
    </header>

    <section class="demo-grid">
      <!-- お客さま側 -->
      <section class="chat-panel customer-panel">
        <div class="panel-header">
          <div>
            <p class="role-chip customer">お客さま側</p>
            <h2>Customer Chat</h2>
          </div>
          <p class="panel-note">
            従業員の強い言葉は、やさしい案内文に変換されて届きます。
          </p>
        </div>

        <div id="customerMessages" class="message-list"></div>

        <form id="customerForm" class="composer">
          <textarea
            id="customerInput"
            placeholder="お客さまのメッセージを入力"
            required
          ></textarea>

          <button id="customerSendButton" class="send-button customer-send" type="submit">
            お客さまとして送信
          </button>
        </form>
      </section>

      <!-- 従業員側 -->
      <section class="chat-panel agent-panel">
        <div class="panel-header">
          <div>
            <p class="role-chip agent">従業員側</p>
            <h2>Agent Chat</h2>
          </div>
          <p class="panel-note">
            お客さまの強い言葉は、落ち着いた要望文に変換されて届きます。
          </p>
        </div>

        <div id="agentMessages" class="message-list"></div>

        <form id="agentForm" class="composer">
          <textarea
            id="agentInput"
            placeholder="従業員のメッセージを入力"
            required
          ></textarea>

          <button id="agentSendButton" class="send-button agent-send" type="submit">
            従業員として送信
          </button>
        </form>
      </section>
    </section>

    <footer class="bottom-caption">
      <span>送信者には原文を表示</span>
      <span>相手にはAIが柔らかく変換した文章を表示</span>
      <span>Cloudflare Workers + Gemini API</span>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
