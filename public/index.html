<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>やわらかCSチャット</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="demo-page">
    <header class="top-bar">
      <div class="title-area">
        <p class="eyebrow">Hackathon Demo</p>
        <h1>やわらかCSチャット</h1>
      </div>

      <p class="concept">
        強い言葉をそのまま届けず、相手にはやさしい言葉として表示するカスタマーサポートチャット
      </p>

      <button id="resetButton" class="reset-button" type="button">
        会話をリセット
      </button>
    </header>

    <section class="demo-grid">
      <!-- お客さま側 -->
      <section class="chat-panel customer-panel">
        <div class="panel-header">
          <div>
            <p class="role-chip customer">お客さま側</p>
            <h2>Customer Chat</h2>
          </div>
          <p class="panel-note">
            従業員の強い言葉は、やさしい案内文に変換されて届きます。
          </p>
        </div>

        <div id="customerMessages" class="message-list"></div>

        <form id="customerForm" class="composer">
          <div class="quick-row">
            <button
              type="button"
              class="quick-chip"
              data-target="customer"
              data-text="なんでまだ返事がないの？早くしてください。"
            >
              返信催促
            </button>

            <button
              type="button"
              class="quick-chip"
              data-target="customer"
              data-text="説明がわかりにくいです。ちゃんと対応してください。"
            >
              説明不満
            </button>

            <button
              type="button"
              class="quick-chip"
              data-target="customer"
              data-text="前にも言いましたよね？何回同じことを聞くんですか？"
            >
              繰り返し不満
            </button>

            <button
              type="button"
              class="quick-chip"
              data-target="customer"
              data-text="この対応はひどすぎます。責任者を出してください。"
            >
              強いクレーム
            </button>

            <button
              type="button"
              class="quick-chip"
              data-target="customer"
              data-text="請求金額がおかしいです。すぐに確認してください。"
            >
              請求トラブル
            </button>

            <button
              type="button"
              class="quick-chip"
              data-target="customer"
              data-text="いつまで待たせるんですか？今日中に対応してください。"
            >
              納期催促
            </button>

            <button
              type="button"
              class="quick-chip"
              data-target="customer"
              data-text="全然納得できません。ちゃんと説明してください。"
            >
              納得できない
            </button>

            <button
              type="button"
              class="quick-chip"
              data-target="customer"
              data-text="もういいです。解約したいので手続きを進めてください。"
            >
              解約希望
            </button>
          </div>

          <textarea
            id="customerInput"
            placeholder="お客さまのメッセージを入力"
            required
          ></textarea>

          <button id="customerSendButton" class="send-button customer-send" type="submit">
            お客さまとして送信
          </button>
        </form>
      </section>

      <!-- 従業員側 -->
      <section class="chat-panel agent-panel">
        <div class="panel-header">
          <div>
            <p class="role-chip agent">従業員側</p>
            <h2>Agent Chat</h2>
          </div>
          <p class="panel-note">
            お客さまの強い言葉は、落ち着いた要望文に変換されて届きます。
          </p>
        </div>

        <div id="agentMessages" class="message-list"></div>

        <form id="agentForm" class="composer">
          <div class="quick-row">
            <button
              type="button"
              class="quick-chip"
              data-target="agent"
              data-text="その言い方では対応できません。必要事項を先に送ってください。"
            >
              強めの案内
            </button>

            <button
              type="button"
              class="quick-chip"
              data-target="agent"
              data-text="こちらでは確認できません。自分で調べてください。"
            >
              突き放し
            </button>

            <button
              type="button"
              class="quick-chip"
              data-target="agent"
              data-text="何度も同じ説明をしています。もう一度確認してください。"
            >
              繰り返し説明
            </button>

            <button
              type="button"
              class="quick-chip"
              data-target="agent"
              data-text="それは対応できません。規約に書いてあります。"
            >
              対応不可
            </button>

            <button
              type="button"
              class="quick-chip"
              data-target="agent"
              data-text="情報が足りないので、これでは調査できません。"
            >
              情報不足
            </button>

            <button
              type="button"
              class="quick-chip"
              data-target="agent"
              data-text="順番に対応しているので待ってください。"
            >
              待機依頼
            </button>

            <button
              type="button"
              class="quick-chip"
              data-target="agent"
              data-text="返金はできません。ご了承ください。"
            >
              返金不可
            </button>

            <button
              type="button"
              class="quick-chip"
              data-target="agent"
              data-text="こちらのミスではないため、対応できません。"
            >
              責任否定
            </button>
          </div>

          <textarea
            id="agentInput"
            placeholder="従業員のメッセージを入力"
            required
          ></textarea>

          <button id="agentSendButton" class="send-button agent-send" type="submit">
            従業員として送信
          </button>
        </form>
      </section>
    </section>

    <footer class="bottom-caption">
      <span>送信者には原文を表示</span>
      <span>相手にはAIが柔らかく変換した文章を表示</span>
      <span>Cloudflare Workers + Gemini API</span>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
